name: Build Crown Installers

on:
  push:
    branches: [main, master, dev]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        default: release
        type: choice
        options: [release, debug]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-name: Windows
            extension: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle-name: Linux
            extension: .AppImage

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    env:
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri app (${{ matrix.bundle-name }})
        run: cargo tauri build
        working-directory: crates/app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Upload artifact (installer)
        uses: actions/upload-artifact@v4
        with:
          name: Crown-${{ matrix.bundle-name }}-Installer
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

      - name: Upload artifact (portable binary)
        uses: actions/upload-artifact@v4
        with:
          name: Crown-${{ matrix.bundle-name }}-Portable
          path: target/release/crown${{ matrix.extension }}
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Crown ${{ github.ref_name }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/crown*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
