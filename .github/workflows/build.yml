name: Build Windows Installer

on:
  push:
    branches: [main, master, dev]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    env:
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: crates/app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Upload artifact (installer)
        uses: actions/upload-artifact@v4
        with:
          name: Crown-Windows-Installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload artifact (portable)
        uses: actions/upload-artifact@v4
        with:
          name: Crown-Windows-Portable
          path: target/release/crown.exe
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Crown ${{ github.ref_name }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/crown.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
