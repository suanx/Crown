[workspace]
members = ["crates/client", "crates/core", "crates/tools", "crates/state", "crates/app", "crates/tokenizer", "crates/mcp", "crates/skill"]
resolver = "2"

[workspace.package]
version = "1.3.9"
edition = "2021"
license = "MIT"

[workspace.dependencies]
anyhow = "1.0"
async-trait = "0.1"
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ignore = "0.4"
globset = "0.4"
grep-regex = "0.1"
grep-searcher = "0.1"
walkdir = "2"
parking_lot = "0.12"
rusqlite = { version = "0.32", features = ["bundled"] }
ulid = { version = "1", features = ["serde"] }
dirs = "5"
chrono = { version = "0.4", features = ["serde"] }
arc-swap = "1"
lru = "0.12"
tokio-util = { version = "0.7", features = ["rt"] }
dashmap = "6"
nix = { version = "0.29", features = ["signal", "process"] }
regex = "1"
scraper = "0.22"
smallvec = { version = "1", features = ["serde"] }
toml = "0.8"
url = "2"
similar = "2"
rmcp = { version = "1.7", default-features = false, features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest", "reqwest"] }
serde_yaml = "0.9"
tempfile = "3"
[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
